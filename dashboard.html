<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | ST Lasers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #050816;
            --card: linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(15, 23, 42, 0.48));
            --accent: #8b5cf6;
            --accent-2: #3b82f6;
            --red: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(124, 58, 237, 0.45), transparent 24%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.28), transparent 22%),
                #050816;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            color: white;
            padding-top: 120px;
            min-height: 100vh;
        }

        .navbar {
            width: min(1120px, calc(100% - 48px));
            display: flex;
            justify-content: center;
            gap: 18px;
            padding: 16px 0;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(10, 17, 30, 0.56));
            border: 1px solid rgba(124, 58, 237, 0.18);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            position: fixed;
            top: 24px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.42);
            left: 50%;
            transform: translateX(-50%);
        }

        .navbar a {
            color: #dbeafe;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
        }

        .navbar a:hover {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.92), rgba(59, 130, 246, 0.72));
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);
        }

        .nav-back { position: absolute; left: 20px; font-size: 14px !important; border: 1px solid rgba(124, 58, 237, 0.25); }

        h1 {
            text-align: center;
            color: #ffffff;
            letter-spacing: 1.4px;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 14px rgba(124, 58, 237, 0.20);
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 28px auto;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .card {
            width: 250px;
            padding: 24px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.46));
            border-radius: 22px;
            text-align: center;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 36px rgba(2, 6, 23, 0.28);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.48), rgba(59, 130, 246, 0.28));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        .card h2 { color: #ffffff; margin: 12px 0 6px; font-size: 30px; }
        .card p { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.18em; }

        .section {
            max-width: 900px;
            margin: 20px auto;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.68), rgba(15, 23, 42, 0.46));
            padding: 24px;
            border-radius: 22px;
            border: 1px solid transparent;
            position: relative;
            box-shadow: 0 12px 32px rgba(2, 6, 23, 0.28);
        }

        .section::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.36), rgba(59, 130, 246, 0.18));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.13);
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 700; display: block; color: #ffffff; }
        .item-meta { font-size: 12px; color: #94a3b8; }
        .item-amt { color: #ffffff; font-weight: 700; width: 120px; text-align: right; margin-right: 20px; }

        .btn-view, .btn-edit, .btn-delete {
            background: none;
            padding: 7px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            margin-left: 5px;
            transition: all 0.25s ease;
        }

        .btn-view { border: 1px solid rgba(148, 163, 184, 0.3); color: #94a3b8; }
        .btn-edit { border: 1px solid rgba(124, 58, 237, 0.5); color: #a78bfa; }
        .btn-delete { border: 1px solid rgba(239, 68, 68, 0.45); color: #fca5a5; }

        .btn-view:hover { background: rgba(148, 163, 184, 0.18); color: #ffffff; }
        .btn-edit:hover { background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(59, 130, 246, 0.7)); color: white; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.82); color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="javascript:history.back()" class="nav-back">← BACK</a>
        <a href="index.html">Home</a>
        <a href="companydetails.html">Clients</a>
        <a href="billing.html">Billing</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="history.html">History</a>
    </nav>

    <h1 style="text-align:center; color:var(--cyan);">ST LASERS DASHBOARD</h1>

    <div class="cards">
        <div class="card"><h2 id="count">0</h2><p>Total Invoices</p></div>
        <div class="card"><h2>₹ <span id="rev">0</span></h2><p>Total Revenue</p></div>
        <div class="card"><h2>₹ <span id="tax">0</span></h2><p>GST Collected</p></div>
    </div>

    <div class="section">
        <h3 style="color:var(--cyan); margin-top:0;">Recent Activity</h3>
        <div id="recentList"></div>
    </div>

    <script>
        if (localStorage.getItem("st_lasers_loggedin") !== "true") {
            window.location.href = "login.html";
        }

        function renderDashboard() {
            const data = JSON.parse(localStorage.getItem("st_lasers_data")) || [];
            let totalRev = 0, totalTax = 0;

            data.forEach(bill => {
                totalRev += parseFloat(bill.grandTotal) || 0;
                totalTax += (parseFloat(bill.cgst) || 0) + (parseFloat(bill.sgst) || 0);
            });

            document.getElementById("count").innerText = data.length;
            document.getElementById("rev").innerText = totalRev.toLocaleString('en-IN');
            document.getElementById("tax").innerText = totalTax.toLocaleString('en-IN');

            const list = document.getElementById("recentList");
            list.innerHTML = "";
            
            // Show last 5
            const recent = [...data].reverse().slice(0, 5);
            recent.forEach((bill, i) => {
                const originalIndex = data.length - 1 - i;
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${bill.customer}</span>
                        <span class="item-meta">Inv: ${bill.invNo} | ${bill.date}</span>
                    </div>
                    <div class="item-amt">₹ ${bill.grandTotal}</div>
                    <div>
                        <button class="btn-view" onclick="viewInv(${originalIndex})">View</button>
                        <button class="btn-edit" onclick="editInv(${originalIndex})">Edit</button>
                        <button class="btn-delete" onclick="deleteInv(${originalIndex})">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function viewInv(index) { window.location.href = `invoice.html?index=${index}`; }
        
        function editInv(index) {
            let data = JSON.parse(localStorage.getItem("st_lasers_data")) || [];
            sessionStorage.setItem("editInvoiceData", JSON.stringify(data[index]));
            sessionStorage.setItem("editIndex", index);
            window.location.href = "billing.html";
        }

        function deleteInv(index) {
            if(confirm("Delete record?")) {
                let data = JSON.parse(localStorage.getItem("st_lasers_data")) || [];
                data.splice(index, 1);
                localStorage.setItem("st_lasers_data", JSON.stringify(data));
                renderDashboard();
            }
        }

        renderDashboard();
    </script>
</body>
</html>
